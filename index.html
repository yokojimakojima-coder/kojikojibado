<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>コジバド!! - 試合作成</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a href="players.html">名簿管理</a>
    <a href="attendance.html">参加チェック</a>
    <a class="active" href="index.html">試合作成</a>
  </div>

  <!-- 設定 -->
  <div class="setting-block">
    <h2>試合設定</h2>

    <label>コート数</label>
    <select id="courtsSelect">
      <option value="1">1コート</option>
      <option value="2">2コート</option>
      <option value="3">3コート</option>
      <option value="4">4コート</option>
    </select>

    <button id="setupBtn">第1試合を作成（リセットして開始）</button>

    <p class="mini-note">
      ※ 参加者は「参加チェック」で保存した人が対象だよ💖<br>
      ※ 1試合ずつ「次の試合を作成」で進めるよ！
    </p>
  </div>

  <!-- 途中参加 / 途中抜け -->
  <div class="setting-block">
    <h2>途中参加 / 途中抜け</h2>

    <div class="row">
      <div class="col">
        <label>選手</label>
        <select id="changePlayer"></select>
      </div>

      <div class="col">
        <label>変更</label>
        <select id="changeType">
          <option value="join">途中参加（次の試合から参加）</option>
          <option value="leave">途中抜け（次の試合から抜ける）</option>
        </select>
      </div>
    </div>

    <button id="applyChangeBtn">変更を適用（次の試合から反映）</button>

    <p class="mini-note" id="roundHint"></p>
  </div>

  <!-- 試合履歴 -->
  <div id="rounds" class="setting-block">
    <h2>試合履歴</h2>
    <p id="noRoundMsg" class="mini-note">まだ試合がありません。</p>
  </div>

  <!-- 次の試合ボタン（最新試合の下に出す） -->
  <div id="nextRoundContainer"></div>

  <!-- ステータス -->
  <div id="playerSummary" class="setting-block" style="display:none;">
    <h2>プレイヤーステータス</h2>
    <div id="playerTable"></div>
  </div>

  <!-- 共通ロジック -->
  <script src="common.js"></script>

  <script>
    // =========================
    // 状態
    // =========================
    let players = [];       // normalizePlayers で作る
    let roundNumber = 1;    // 次に作る試合番号
    let schedule = {};      // scheduleData（localStorage）

    // =========================
    // 初期化
    // =========================
    window.addEventListener("load", () => {
      document.getElementById("setupBtn").addEventListener("click", startFresh);
      document.getElementById("applyChangeBtn").addEventListener("click", applyChange);

      // 画面だけ先に整える
      refreshRoundHint();
      populateChangePlayerList();
    });

    // =========================
    // 第1試合（リセット開始）
    // =========================
    function startFresh() {
      const activeNames = getActivePlayers();

      if (!activeNames || activeNames.length < 4) {
        alert("参加者は4人以上必要だよ💦\n『参加チェック』で保存してきてね！");
        return;
      }

      // players 初期化（Setあり）
      players = normalizePlayers(activeNames);

      // スケジュール初期化：最初の参加者は 1〜999
      schedule = {};
      players.forEach(p => {
        schedule[p.name] = [{ from: 1, to: 999 }];
      });
      saveSchedule(schedule);

      roundNumber = 1;

      // 表示初期化
      document.getElementById("rounds").innerHTML = "<h2>試合履歴</h2>";
      document.getElementById("nextRoundContainer").innerHTML = "";
      document.getElementById("playerSummary").style.display = "block";

      populateChangePlayerList();
      refreshRoundHint();

      // 第1試合を作る
      createNextRound();
    }

    // =========================
    // 次の試合を作る
    // =========================
    function createNextRound() {
      // 念のため schedule を読み直し（途中参加/抜け反映）
      schedule = getSchedule();

      // 念のため Set を保証（壊れてたら復元）
      players = players.map(p => ({
        ...p,
        partners: (p.partners instanceof Set) ? p.partners : new Set(Array.isArray(p.partners) ? p.partners : []),
        opponents: (p.opponents instanceof Set) ? p.opponents : new Set(Array.isArray(p.opponents) ? p.opponents : []),
      }));

      const courtCount = Number(document.getElementById("courtsSelect").value);

      const result = generateRound(
        players,
        roundNumber,
        courtCount,
        getAiWeights(),
        schedule
      );

      if (!result || !result.rounds || result.rounds.length === 0) {
        alert("もう組めないかも🥺（参加できる人が足りない/偏り回避しすぎ）\n途中抜け設定とか参加人数を確認してみてね！");
        return;
      }

      renderRound(result.rounds, result.refs);
      renderPlayerTable();

      roundNumber++;
      refreshRoundHint();
    }

    // =========================
    // 途中参加 / 途中抜け（次の試合から反映）
    // =========================
    function populateChangePlayerList() {
      const select = document.getElementById("changePlayer");
      if (!select) return;

      const roster = getAllPlayers();
      const fallback = getActivePlayers();
      const list = (roster && roster.length > 0) ? roster : fallback;

      select.innerHTML = "";

      list.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    }

    function applyChange() {
      if (players.length === 0) {
        alert("先に『第1試合を作成』で開始してね💖");
        return;
      }

      const name = document.getElementById("changePlayer").value;
      const type = document.getElementById("changeType").value;

      schedule = getSchedule();

      // players にいなければ追加（途中参加のため）
      let p = players.find(x => x.name === name);
      if (!p && type === "join") {
        players.push({
          name,
          idx: players.length,
          games: 0,
          refs: 0,
          rests: 0,
          partners: new Set(),
          opponents: new Set(),
          lastRoundPlayed: 0,
          lastRefRound: 0,
          lastRestRound: 0
        });
        // activePlayers にも追加（あとで参加チェック開いた時に整合する）
        const active = getActivePlayers();
        if (!active.includes(name)) {
          active.push(name);
          saveActivePlayersList(active);
        }
      }

      // schedule が無ければ作る（未参加者）
      if (!schedule[name]) schedule[name] = [];

      if (type === "join") {
        // 次の試合から参加： {from: roundNumber, to: 999} を追加
        // もしすでにその試合に参加扱いなら何もしない
        const already = isAvailableAtRound(name, roundNumber, schedule);
        if (already) {
          alert("この人、もう『次の試合』から参加になってるよ💖");
          return;
        }
        schedule[name].push({ from: roundNumber, to: 999 });
        saveSchedule(schedule);
        alert(`OK💖 ${name} を【第${roundNumber}試合】から参加にしたよ！`);

      } else if (type === "leave") {
        // 次の試合から抜け： roundNumber 以降を参加不可にする
        // = roundNumber を含む区間があれば、その区間の to を roundNumber-1 にする
        let changed = false;

        schedule[name] = (schedule[name] || []).map(seg => {
          if (seg.from <= roundNumber && roundNumber <= seg.to) {
            changed = true;
            return { from: seg.from, to: roundNumber - 1 };
          }
          return seg;
        });

        saveSchedule(schedule);

        if (changed) {
          alert(`了解💖 ${name} を【第${roundNumber}試合】から抜けにしたよ！`);
        } else {
          alert("この人は、そもそも次の試合に参加予定じゃないかも🥺（設定済み）");
        }
      }

      refreshRoundHint();
    }

    function refreshRoundHint() {
      const el = document.getElementById("roundHint");
      if (!el) return;
      el.textContent = `今は【第${roundNumber}試合】を作るところだよ💖（変更はこの試合から反映）`;
    }

    // =========================
    // 表示：試合カード
    // =========================
    function renderRound(rounds, refs) {
      const area = document.getElementById("rounds");
      const noMsg = document.getElementById("noRoundMsg");
      if (noMsg) noMsg.remove();

      const box = document.createElement("div");
      box.className = "match-round";

      const title = document.createElement("div");
      title.className = "round-title";
      title.textContent = `第${roundNumber}試合`;
      box.appendChild(title);

      rounds.forEach((r, i) => {
        const card = document.createElement("div");
        card.className = "match-card";

        const refIdx = refs && refs[i] !== null && refs[i] !== undefined ? refs[i] : null;
        const refName = refIdx === null ? "セルフ/なし" : players[refIdx]?.name ?? "—";

        const a1 = players[r.teamA[0]]?.name ?? "?";
        const a2 = players[r.teamA[1]]?.name ?? "?";
        const b1 = players[r.teamB[0]]?.name ?? "?";
        const b2 = players[r.teamB[1]]?.name ?? "?";

        card.innerHTML = `
          <div class="court-line">
            <span class="badge">コート${i + 1}</span>
            <span class="ref">審判：${escapeHtml(refName)}</span>
          </div>
          <div class="teams">
            <div class="team">
              <span class="team-label">A</span>
              <span class="names">${escapeHtml(a1)} ＆ ${escapeHtml(a2)}</span>
            </div>
            <div class="vs">VS</div>
            <div class="team">
              <span class="team-label">B</span>
              <span class="names">${escapeHtml(b1)} ＆ ${escapeHtml(b2)}</span>
            </div>
          </div>
        `;

        box.appendChild(card);
      });

      area.appendChild(box);

      // 最新試合の下にボタンを出す
      document.getElementById("nextRoundContainer").innerHTML = `
        <button class="next-btn" onclick="createNextRound()">次の試合を作成</button>
      `;
    }

    // =========================
    // 表示：ステータス（ここで確認するスタイル）
    // =========================
    function renderPlayerTable() {
      let html = `
        <div class="status-grid">
      `;

      players.forEach(p => {
        html += `
          <div class="status-card">
            <div class="status-name">${escapeHtml(p.name)}</div>
            <div class="status-row"><span>試合</span><b>${p.games}</b></div>
            <div class="status-row"><span>審判</span><b>${p.refs}</b></div>
            <div class="status-row"><span>休憩</span><b>${p.rests}</b></div>
          </div>
        `;
      });

      html += `</div>`;

      document.getElementById("playerTable").innerHTML = html;
    }

    // =========================
    // helper（index内でも使う）
    // =========================
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return escapeHtml(str).replaceAll("\n", " ");
    }
  </script>

</body>
</html>
