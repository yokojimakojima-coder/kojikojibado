<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 参加チェック</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=20260422_03">
</head>
<body>
  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a href="players.html" class="nav-link">名簿管理</a>
    <a href="attendance.html" class="nav-link active">参加チェック</a>
    <a href="index.html" class="nav-link">試合作成</a>
  </div>

  <div class="setting-block">
    <h2>参加チェック</h2>
    <p class="hint">今日来てる人にチェックしてね💖</p>

    <div class="row">
      <button id="allOn" class="small">全員ON</button>
      <button id="allOff" class="small danger">全員OFF</button>
    </div>

    <div id="checks" class="check-list"></div>

    <button id="saveBtn">参加者を保存 → 試合作成へ</button>
  </div>

  <script src="common.js?v=20260422_03"></script>
  <script>
    function render() {
      const all = getAllPlayers();
      const active = new Set(getActivePlayers());

      const box = document.getElementById("checks");
      box.innerHTML = "";

      if (!all || all.length === 0) {
        box.innerHTML = `<p class="hint">名簿が空だよ。先に「名簿管理」で追加してね🙏</p>`;
        return;
      }

      all.forEach(name => {
        const id = "cb_" + name;
        const line = document.createElement("label");
        line.className = "check-item";
        line.innerHTML = `
          <input type="checkbox" class="chk" data-name="${name}" ${active.has(name) ? "checked" : ""}>
          <span>${name}</span>
        `;
        box.appendChild(line);
      });
    }

    document.getElementById("allOn").addEventListener("click", () => {
      document.querySelectorAll(".chk").forEach(cb => cb.checked = true);
    });
    document.getElementById("allOff").addEventListener("click", () => {
      document.querySelectorAll(".chk").forEach(cb => cb.checked = false);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const checked = [];
      document.querySelectorAll(".chk").forEach(cb => {
        if (cb.checked) checked.push(cb.dataset.name);
      });

      if (checked.length < 4) {
        alert("4人以上チェックしてね💦");
        return;
      }

      setActivePlayers(checked);

      // stateは継続したいなら消さない。初期化したいなら消す。
      localStorage.removeItem("kojibado_state_v5");
      alert("保存したよ💖 試合作成へ移動するね！");
      location.href = "index.html";
    });

    render();
  </script>
</body>
</html>
