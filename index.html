<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 試合作成</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">コジバド!!</h1>

<div class="top-nav">
  <a href="players.html">名簿管理</a>
  <a href="attendance.html">参加チェック</a>
  <a class="active" href="index.html">試合作成</a>
</div>

<div class="setting-block">
  <h2>試合設定</h2>

  <label>コート数</label>
  <select id="courtsSelect">
    <option value="1">1コート</option>
    <option value="2">2コート</option>
    <option value="3">3コート</option>
    <option value="4">4コート</option>
  </select>

  <button id="setupBtn">第1試合を作成</button>
</div>

<div class="setting-block">
  <h2>途中参加 / 途中抜け</h2>

  <label>途中参加（新規 or 復帰）</label>
  <select id="joinSelect"></select>
  <button id="joinBtn">途中参加を適用（次の試合から）</button>

  <div style="height:12px"></div>

  <label>途中抜け</label>
  <select id="leaveSelect"></select>
  <button id="leaveBtn">途中抜けを適用（次の試合から）</button>
</div>

<div id="rounds" class="setting-block">
  <h2>試合履歴</h2>
</div>

<div id="nextRoundContainer"></div>

<div id="playerSummary" class="setting-block">
  <h2>プレイヤーステータス</h2>
  <div id="playerTable"></div>
</div>

<script src="common.js"></script>

<script>
let players = [];
let roundNumber = 1;
let schedule = {};

document.getElementById("setupBtn").onclick = () => {
  const activeNames = getActivePlayers();

  if (!activeNames || activeNames.length < 4) {
    alert("参加者は4人以上必要だよ💦");
    return;
  }

  players = normalizePlayers(activeNames);

  // 全員いつでも参加できる前提
  schedule = {};
  players.forEach(p => {
    schedule[p.name] = [{ from: 1, to: 999 }];
  });
  saveSchedule(schedule);

  roundNumber = 1;
  document.getElementById("rounds").innerHTML = "<h2>試合履歴</h2>";
  document.getElementById("nextRoundContainer").innerHTML = "";

  repopulateSelects();
  createNextRound();
};

document.getElementById("joinBtn").onclick = () => {
  const name = document.getElementById("joinSelect").value;
  if (!name) return;

  schedule = getSchedule();

  // 既存にいる？
  let p = players.find(x => x.name === name);

  // 新規追加
  if (!p) {
    p = {
      name,
      idx: players.length,
      games: 0,
      refs: 0,
      rests: 0,
      partners: new Set(),
      opponents: new Set(),
      lastRoundPlayed: 0,
      lastRefRound: 0,
      lastRestRound: 0
    };
    players.push(p);
  }

  // スケジュールに参加区間を追加（次の試合＝roundNumberから）
  if (!schedule[name]) schedule[name] = [];
  schedule[name].push({ from: roundNumber, to: 999 });

  // セグメント整形（重なりマージ）
  schedule[name] = mergeSegments(schedule[name]);

  saveSchedule(schedule);

  // ✅ ここが今回の要：追いつかせない補正
  applyJoinBaseline(players, name, roundNumber, schedule);

  repopulateSelects();
  alert(`途中参加/復帰を反映したよ！次の試合から ${name} 参加👍`);
};

document.getElementById("leaveBtn").onclick = () => {
  const name = document.getElementById("leaveSelect").value;
  if (!name) return;

  schedule = getSchedule();
  if (!schedule[name] || schedule[name].length === 0) {
    schedule[name] = [{ from: 1, to: 999 }];
  }

  // 「今以降の参加」を止める：roundNumber から先をカット
  schedule[name] = cutFromRound(schedule[name], roundNumber);

  saveSchedule(schedule);
  repopulateSelects();
  alert(`途中抜けを反映したよ！次の試合から ${name} は不参加🙏`);
};

function createNextRound() {
  const courtCount = Number(document.getElementById("courtsSelect").value);
  schedule = getSchedule();

  const result = generateRound(
    players,
    roundNumber,
    courtCount,
    getAiWeights(),
    schedule
  );

  if (!result || !result.rounds || result.rounds.length === 0) {
    alert("もう組めないかも🥺（参加人数 or 条件的に厳しい）");
    return;
  }

  renderRound(result.rounds, result.refs, result.benches);
  renderPlayerTable();
  roundNumber++;

  repopulateSelects();
}

function renderRound(rounds, refs, benches) {
  const box = document.createElement("div");
  box.className = "match-round";
  box.innerHTML = `<h3>第${roundNumber}試合</h3>`;

  rounds.forEach((r, i) => {
    const refText = (refs[i] === null || refs[i] === undefined)
      ? "（審判：なし）"
      : `（審判：${players[refs[i]].name}）`;

    box.innerHTML += `
      <div class="match-card">
        <div class="court-title">コート${i + 1} ${refText}</div>
        <div class="teams">
          <div class="team">
            <div class="team-label">Team A</div>
            <div class="team-members">${players[r.teamA[0]].name} ＆ ${players[r.teamA[1]].name}</div>
          </div>
          <div class="vs">vs</div>
          <div class="team">
            <div class="team-label">Team B</div>
            <div class="team-members">${players[r.teamB[0]].name} ＆ ${players[r.teamB[1]].name}</div>
          </div>
        </div>
      </div>
    `;
  });

  if (benches && benches.length > 0) {
    box.innerHTML += `<div class="bench">休憩：${benches.map(i => players[i].name).join(" / ")}</div>`;
  }

  document.getElementById("rounds").appendChild(box);

  // 最新試合の下にボタン
  document.getElementById("nextRoundContainer").innerHTML =
    `<button onclick="createNextRound()">次の試合を作成</button>`;
}

function renderPlayerTable() {
  let html = `
    <table class="status-table">
      <tr>
        <th>名前</th>
        <th>試合</th>
        <th>審判</th>
        <th>休憩</th>
      </tr>
  `;

  players.forEach(p => {
    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.games}</td>
        <td>${p.refs}</td>
        <td>${p.rests}</td>
      </tr>
    `;
  });

  html += `</table>`;
  document.getElementById("playerTable").innerHTML = html;
}

/* ====== セレクト再生成 ====== */
function repopulateSelects() {
  const all = getAllPlayers();
  const active = getActivePlayers();
  const byName = new Map(players.map(p => [p.name, p]));

  const source = (all && all.length > 0) ? all : active;

  const joinCandidates = [];
  source.forEach(name => {
    const p = byName.get(name);
    if (!p) {
      joinCandidates.push({ name, kind: "new" });
    } else {
      if (!isAvailableAtRound(name, roundNumber, schedule)) {
        joinCandidates.push({ name, kind: "return" });
      }
    }
  });

  const joinSel = document.getElementById("joinSelect");
  joinSel.innerHTML = "";
  if (joinCandidates.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "（途中参加/復帰候補なし）";
    joinSel.appendChild(opt);
  } else {
    joinCandidates.forEach(obj => {
      const opt = document.createElement("option");
      opt.value = obj.name;
      opt.textContent = obj.kind === "return" ? `【復帰】${obj.name}` : obj.name;
      joinSel.appendChild(opt);
    });
  }

  const leaveSel = document.getElementById("leaveSelect");
  leaveSel.innerHTML = "";
  const leaveCandidates = players
    .filter(p => isAvailableAtRound(p.name, roundNumber, schedule))
    .map(p => p.name);

  if (leaveCandidates.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "（途中抜け候補なし）";
    leaveSel.appendChild(opt);
  } else {
    leaveCandidates.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      leaveSel.appendChild(opt);
    });
  }
}

/* ====== schedule のセグメント整形 ====== */
function mergeSegments(segs) {
  if (!segs || segs.length === 0) return [];
  const s = segs
    .map(x => ({ from: Number(x.from), to: Number(x.to) }))
    .sort((a,b) => a.from - b.from);

  const merged = [s[0]];
  for (let i = 1; i < s.length; i++) {
    const last = merged[merged.length - 1];
    const cur = s[i];
    if (cur.from <= last.to + 1) {
      last.to = Math.max(last.to, cur.to);
    } else {
      merged.push(cur);
    }
  }
  return merged;
}

function cutFromRound(segs, fromRound) {
  if (!segs || segs.length === 0) return [];
  const out = [];
  for (const seg of segs) {
    // segが完全に fromRound より前なら残す
    if (seg.to < fromRound) {
      out.push({ ...seg });
      continue;
    }
    // segが fromRound を跨ぐなら to を切る
    if (seg.from < fromRound && seg.to >= fromRound) {
      out.push({ from: seg.from, to: fromRound - 1 });
      continue;
    }
    // seg.from >= fromRound は未来なので捨てる（抜け）
  }
  return out;
}
</script>

</body>
</html>
