<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 名簿管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=20260422_11">
</head>
<body>
  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a class="nav-link active" href="players.html">名簿管理</a>
    <a class="nav-link" href="attendance.html">参加チェック</a>
    <a class="nav-link" href="index.html">試合作成</a>
  </div>

  <div class="setting-block">
    <h2>名簿管理</h2>

    <div class="vertical-form">
      <input id="newName" class="full-input" placeholder="名前を入力（例：コジコジ）">
      <button id="addBtn" class="main-btn">追加</button>
      <button id="clearBtn" class="danger-btn">名簿を全削除</button>
    </div>

    <ul id="list" class="name-list"></ul>
  </div>

  <script src="common.js?v=20260422_11"></script>
  <script>
    function esc(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";
      const all = getAllPlayers();

      if (all.length === 0) {
        list.innerHTML = `<li class="empty-message">まだ名簿がないよ</li>`;
        return;
      }

      all.forEach((name, idx) => {
        const li = document.createElement("li");
        li.className = "name-item";
        li.innerHTML = `
          <span class="name">${esc(name)}</span>
          <button class="mini danger-btn" data-idx="${idx}">削除</button>
        `;
        list.appendChild(li);
      });

      list.querySelectorAll("button[data-idx]").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.idx);
          const all2 = getAllPlayers();
          const removed = all2[i];
          all2.splice(i, 1);
          setAllPlayers(all2);

          // activePlayersからも消す
          const active = getActivePlayers().filter(n => n !== removed);
          setActivePlayers(active);

          render();
        });
      });
    }

    function add() {
      const input = document.getElementById("newName");
      const name = input.value.trim();
      if (!name) return;

      const all = getAllPlayers();
      if (all.includes(name)) {
        alert("その名前はもうあるよ💖");
        return;
      }
      all.push(name);
      setAllPlayers(all);
      input.value = "";
      render();
    }

    document.getElementById("addBtn").addEventListener("click", add);
    document.getElementById("newName").addEventListener("keydown", (e) => {
      if (e.key === "Enter") add();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("名簿を全部消す？")) return;
      setAllPlayers([]);
      setActivePlayers([]);
      localStorage.removeItem("scheduleData");
      localStorage.removeItem("kojibado_state_v5");
      render();
    });

    render();
  </script>
</body>
</html>
