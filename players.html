<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 名簿管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=20260422_10">
</head>
<body>

  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a class="active" href="players.html">名簿管理</a>
    <a href="attendance.html">参加チェック</a>
    <a href="index.html">試合作成</a>
  </div>

  <div class="setting-block">
    <h2>名簿管理</h2>

    <div class="vertical-form">
      <input
        type="text"
        id="playerNameInput"
        class="full-input"
        placeholder="名前を入力"
      >

      <button id="addPlayerBtn" class="main-btn">追加</button>
      <button id="clearPlayersBtn" class="danger-btn">名簿を全削除</button>
    </div>

    <div id="playerList" class="player-list"></div>
  </div>

  <script src="common.js?v=20260422_10"></script>
  <script>
    function getPlayersSafe() {
      return getAllPlayers ? getAllPlayers() : JSON.parse(localStorage.getItem("allPlayers") || "[]");
    }

    function savePlayersSafe(players) {
      localStorage.setItem("allPlayers", JSON.stringify(players));
    }

    function renderPlayers() {
      const list = document.getElementById("playerList");
      const players = getPlayersSafe();

      list.innerHTML = "";

      if (players.length === 0) {
        list.innerHTML = `<div class="empty-message">まだ名簿がないよ</div>`;
        return;
      }

      players.forEach((name, index) => {
        const row = document.createElement("div");
        row.className = "player-row";
        row.innerHTML = `
          <span class="player-name">${name}</span>
          <button class="delete-btn" onclick="deletePlayer(${index})">削除</button>
        `;
        list.appendChild(row);
      });
    }

    function addPlayer() {
      const input = document.getElementById("playerNameInput");
      const name = input.value.trim();
      if (!name) return;

      const players = getPlayersSafe();

      if (players.includes(name)) {
        alert("その名前はすでに登録済みだよ");
        return;
      }

      players.push(name);
      savePlayersSafe(players);

      input.value = "";
      renderPlayers();
    }

    function deletePlayer(index) {
      const players = getPlayersSafe();
      players.splice(index, 1);
      savePlayersSafe(players);

      const activePlayers = JSON.parse(localStorage.getItem("activePlayers") || "[]")
        .filter(name => players.includes(name));
      localStorage.setItem("activePlayers", JSON.stringify(activePlayers));

      renderPlayers();
    }

    function clearPlayers() {
      if (!confirm("名簿を全部削除する？")) return;

      localStorage.setItem("allPlayers", JSON.stringify([]));
      localStorage.setItem("activePlayers", JSON.stringify([]));
      renderPlayers();
    }

    document.getElementById("addPlayerBtn").addEventListener("click", addPlayer);
    document.getElementById("clearPlayersBtn").addEventListener("click", clearPlayers);

    document.getElementById("playerNameInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") addPlayer();
    });

    renderPlayers();
  </script>
</body>
</html>
