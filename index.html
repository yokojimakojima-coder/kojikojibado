<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 試合作成</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">コジバド!!</h1>

<div class="top-nav">
  <a href="players.html">名簿管理</a>
  <a href="attendance.html">参加チェック</a>
  <a class="active" href="index.html">試合作成</a>
</div>

<div class="setting-block">
  <h2>試合設定</h2>

  <label>コート数</label>
  <select id="courtsSelect">
    <option value="1">1コート</option>
    <option value="2">2コート</option>
    <option value="3">3コート</option>
    <option value="4">4コート</option>
  </select>

  <button id="setupBtn">第1試合を作成</button>
</div>

<div class="setting-block">
  <h2>途中参加 / 途中抜け</h2>

  <div class="two-col">
    <div>
      <label>途中参加（新規 or 復帰）</label>
      <select id="joinSelect"></select>
      <button id="joinBtn">途中参加を適用（次の試合から）</button>
    </div>

    <div>
      <label>途中抜け</label>
      <select id="leaveSelect"></select>
      <button id="leaveBtn" class="danger">途中抜けを適用（次の試合から）</button>
    </div>
  </div>
</div>

<div id="rounds" class="setting-block">
  <h2>試合履歴</h2>
  <p id="noRoundMsg">まだ試合がありません。</p>
</div>

<div id="nextRoundContainer"></div>

<div id="playerSummary" class="setting-block" style="display:none;">
  <h2>プレイヤーステータス</h2>
  <div id="playerTable"></div>
</div>

<script src="common.js"></script>

<script>
let players = [];
let roundNumber = 1;
let schedule = {}; // { name: [{from,to},...] }

const STATE_KEY = "matchState_v1";

/* -----------------------
   初期化
----------------------- */
window.onload = () => {
  document.getElementById("setupBtn").onclick = setupFirstRound;
  document.getElementById("joinBtn").onclick = applyJoin;
  document.getElementById("leaveBtn").onclick = applyLeave;

  // 途中でリロードしても続きから動けるように
  loadState();
  repopulateSelects();
  renderPlayerTable();
};

/* -----------------------
   状態保存/復元
----------------------- */
function serializePlayer(p) {
  return {
    ...p,
    partners: Array.from(p.partners || []),
    opponents: Array.from(p.opponents || []),
  };
}

function revivePlayer(p) {
  const np = { ...p };
  np.partners = new Set(p.partners || []);
  np.opponents = new Set(p.opponents || []);
  if (!np.partnersCount) np.partnersCount = {};
  if (!np.opponentsCount) np.opponentsCount = {};
  return np;
}

function saveState() {
  const state = {
    roundNumber,
    schedule,
    players: players.map(serializePlayer),
    historyHtml: document.getElementById("rounds").innerHTML,
    courts: document.getElementById("courtsSelect").value
  };
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STATE_KEY);
  if (!raw) return;

  try {
    const s = JSON.parse(raw);
    roundNumber = s.roundNumber || 1;
    schedule = s.schedule || getSchedule() || {};
    players = (s.players || []).map(revivePlayer);

    // 履歴復元
    if (s.historyHtml) {
      document.getElementById("rounds").innerHTML = s.historyHtml;
      const no = document.getElementById("noRoundMsg");
      if (no) no.remove();
    }

    if (s.courts) document.getElementById("courtsSelect").value = s.courts;

    if (players.length > 0) {
      document.getElementById("playerSummary").style.display = "block";
      // 次の試合ボタンも復元
      document.getElementById("nextRoundContainer").innerHTML =
        `<button onclick="createNextRound()">次の試合を作成</button>`;
    }
  } catch (e) {
    console.log("state復元失敗", e);
  }
}

/* -----------------------
   第1試合を作成
----------------------- */
function setupFirstRound() {
  const activeNames = getActivePlayers();

  if (!activeNames || activeNames.length < 4) {
    alert("参加者は4人以上必要だよ💦（参加チェックで選んでね）");
    return;
  }

  // ★超重要：common.js の normalizePlayers を使う
  players = normalizePlayers(activeNames);

  // スケジュール初期化：全員ずっと参加
  schedule = {};
  players.forEach(p => {
    schedule[p.name] = [{ from: 1, to: 9999 }];
  });
  saveSchedule(schedule);

  // 初期ラウンド
  roundNumber = 1;

  // 表示リセット
  document.getElementById("rounds").innerHTML = "<h2>試合履歴</h2>";
  document.getElementById("nextRoundContainer").innerHTML = "";
  document.getElementById("playerSummary").style.display = "block";

  repopulateSelects();
  renderPlayerTable();
  saveState();

  createNextRound();
}

/* -----------------------
   次の試合を作る
----------------------- */
function createNextRound() {
  // schedule の最新を使う
  schedule = getSchedule() || schedule || {};

  // 念のため Set を保証
  players = players.map(p => ({
    ...p,
    partners: p.partners instanceof Set ? p.partners : new Set(p.partners || []),
    opponents: p.opponents instanceof Set ? p.opponents : new Set(p.opponents || []),
    partnersCount: p.partnersCount || {},
    opponentsCount: p.opponentsCount || {},
  }));

  const courtCount = Number(document.getElementById("courtsSelect").value);

  const result = generateRound(
    players,
    roundNumber,
    courtCount,
    getAiWeights(),
    schedule
  );

  if (!result || !result.rounds || result.rounds.length === 0) {
    alert("もう組めないかも🥺（参加人数・コート数を見直してみて）");
    return;
  }

  renderRound(result.rounds, result.refs, result.benches);
  renderPlayerTable();
  roundNumber++;

  saveState();
  repopulateSelects();
}

/* -----------------------
   途中参加（新規 or 復帰）
   - 抜けてた分を追い上げない（基準点リセット）
----------------------- */
function applyJoin() {
  const name = document.getElementById("joinSelect").value;
  if (!name) return;

  // すでに次の試合で参加できるなら何もしない
  if (isAvailableAtRound(name, roundNumber)) {
    alert("もう参加中だよ💖");
    return;
  }

  // schedule に参加区間を追加（次の試合から）
  schedule = getSchedule() || schedule || {};
  if (!schedule[name]) schedule[name] = [];
  schedule[name].push({ from: roundNumber, to: 9999 });
  saveSchedule(schedule);

  // players にいるか？
  let p = players.find(x => x.name === name);

  if (!p) {
    // 新規参加：playersに追加
    const newIdx = players.length;
    p = {
      name,
      idx: newIdx,
      games: 0,
      refs: 0,
      rests: 0,
      lastRoundPlayed: roundNumber - 1,
      lastRefRound: 0,
      lastRestRound: roundNumber - 1,
      partnersCount: {},
      opponentsCount: {},
      partners: new Set(),
      opponents: new Set(),

      // ★追い上げ禁止の基準点
      joinRound: roundNumber,
      gamesAtJoin: 0,
      refsAtJoin: 0,
      restsAtJoin: 0
    };
    players.push(p);
  } else {
    // 復帰：追い上げ禁止（基準点を今に更新）
    p.joinRound = roundNumber;
    p.gamesAtJoin = p.games || 0;
    p.refsAtJoin = p.refs || 0;
    p.restsAtJoin = p.rests || 0;

    // “復帰即連戦”になりづらくする軽いケア
    p.lastRoundPlayed = Math.min(p.lastRoundPlayed || 0, roundNumber - 1);
    p.lastRestRound = roundNumber - 1;
  }

  // activePlayersにも追加（整合）
  const active = getActivePlayers();
  if (!active.includes(name)) {
    active.push(name);
    setActivePlayers(active);
  }

  repopulateSelects();
  renderPlayerTable();
  saveState();

  alert(`途中参加/復帰を反映したよ💖（${roundNumber}試合目から）`);
}

/* -----------------------
   途中抜け（次の試合から不参加）
----------------------- */
function applyLeave() {
  const name = document.getElementById("leaveSelect").value;
  if (!name) return;

  if (!isAvailableAtRound(name, roundNumber)) {
    alert("その人は今もう参加してないよ🥺");
    return;
  }

  schedule = getSchedule() || schedule || {};
  if (!schedule[name]) schedule[name] = [{ from: 1, to: 9999 }];

  // 今のroundNumberを含む区間を探して to を roundNumber-1 に
  const segs = schedule[name];
  for (const seg of segs) {
    if (seg.from <= roundNumber && roundNumber <= seg.to) {
      seg.to = roundNumber - 1;
      break;
    }
  }
  saveSchedule(schedule);

  repopulateSelects();
  saveState();
  alert(`途中抜けを反映したよ🥺（${roundNumber}試合目から不参加）`);
}

/* -----------------------
   プルダウン再構築
   - 途中参加：新規 + 復帰（今不参加の人）
   - 途中抜け：今参加中の人
----------------------- */
function repopulateSelects() {
  const all = getAllPlayers();
  const byName = new Map(players.map(p => [p.name, p]));

  // join候補：①playersにいない ②playersにいるけど今不参加（復帰）
  const joinCandidates = [];
  all.forEach(name => {
    const p = byName.get(name);
    if (!p) {
      joinCandidates.push({ name, kind: "new" });
    } else {
      if (!isAvailableAtRound(name, roundNumber)) {
        joinCandidates.push({ name, kind: "return" });
      }
    }
  });

  const joinSel = document.getElementById("joinSelect");
  joinSel.innerHTML = "";
  if (joinCandidates.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "（途中参加/復帰候補なし）";
    joinSel.appendChild(opt);
  } else {
    joinCandidates.forEach(obj => {
      const opt = document.createElement("option");
      opt.value = obj.name;
      opt.textContent = obj.kind === "return" ? `【復帰】${obj.name}` : obj.name;
      joinSel.appendChild(opt);
    });
  }

  const leaveSel = document.getElementById("leaveSelect");
  leaveSel.innerHTML = "";
  const leaveCandidates = players
    .filter(p => isAvailableAtRound(p.name, roundNumber))
    .map(p => p.name);

  if (leaveCandidates.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "（途中抜け候補なし）";
    leaveSel.appendChild(opt);
  } else {
    leaveCandidates.forEach(name => {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      leaveSel.appendChild(opt);
    });
  }
}

/* -----------------------
   表示：試合履歴
----------------------- */
function renderRound(rounds, refs, benches) {
  const area = document.getElementById("rounds");
  const no = document.getElementById("noRoundMsg");
  if (no) no.remove();

  const box = document.createElement("div");
  box.className = "match-round";

  const title = document.createElement("h3");
  title.textContent = `第${roundNumber}試合`;
  box.appendChild(title);

  rounds.forEach((r, i) => {
    const card = document.createElement("div");
    card.className = "match-card";

    const a1 = players[r.teamA[0]]?.name ?? "?";
    const a2 = players[r.teamA[1]]?.name ?? "?";
    const b1 = players[r.teamB[0]]?.name ?? "?";
    const b2 = players[r.teamB[1]]?.name ?? "?";
    const refName = players[refs[i]]?.name ?? "?";

    card.innerHTML = `
      <div class="court-line">コート${i + 1} <span class="ref">（審判：${refName}）</span></div>
      <div class="teams">
        <div class="team">Team A：<b>${a1}</b> ＆ <b>${a2}</b></div>
        <div class="vs">vs</div>
        <div class="team">Team B：<b>${b1}</b> ＆ <b>${b2}</b></div>
      </div>
    `;
    box.appendChild(card);
  });

  // 休憩は第1試合のところに出したくないって言ってたから “表示しない” ままにしてるよ💖
  area.appendChild(box);

  // 最新試合の下に「次の試合」ボタン
  document.getElementById("nextRoundContainer").innerHTML =
    `<button onclick="createNextRound()">次の試合を作成</button>`;
}

/* -----------------------
   表示：ステータス
----------------------- */
function renderPlayerTable() {
  if (!players || players.length === 0) return;

  let html = `
    <table class="status-table">
      <tr>
        <th>名前</th>
        <th>試合</th>
        <th>審判</th>
        <th>休憩</th>
      </tr>
  `;

  players.forEach(p => {
    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.games || 0}</td>
        <td>${p.refs || 0}</td>
        <td>${p.rests || 0}</td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("playerTable").innerHTML = html;
}
</script>

</body>
</html>
