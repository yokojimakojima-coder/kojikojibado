<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 参加チェック</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=20260422_10">
</head>
<body>

  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a href="players.html">名簿管理</a>
    <a class="active" href="attendance.html">参加チェック</a>
    <a href="index.html">試合作成</a>
  </div>

  <div class="setting-block">
    <h2>参加チェック</h2>

    <div class="vertical-form">
      <button id="allOnBtn" class="main-btn">全員ON</button>
      <button id="allOffBtn" class="danger-btn">全員OFF</button>
    </div>

    <div id="attendanceList" class="attendance-list"></div>
  </div>

  <script src="common.js?v=20260422_10"></script>
  <script>
    function getPlayersSafe() {
      return getAllPlayers ? getAllPlayers() : JSON.parse(localStorage.getItem("allPlayers") || "[]");
    }

    function getActiveSafe() {
      return getActivePlayers ? getActivePlayers() : JSON.parse(localStorage.getItem("activePlayers") || "[]");
    }

    function saveActiveSafe(activePlayers) {
      localStorage.setItem("activePlayers", JSON.stringify(activePlayers));
    }

    function renderAttendance() {
      const allPlayers = getPlayersSafe();
      const activePlayers = getActiveSafe();
      const list = document.getElementById("attendanceList");

      list.innerHTML = "";

      if (allPlayers.length === 0) {
        list.innerHTML = `<div class="empty-message">先に名簿管理で名前を登録してね</div>`;
        return;
      }

      allPlayers.forEach((name) => {
        const checked = activePlayers.includes(name);

        const row = document.createElement("label");
        row.className = "attendance-row";
        row.innerHTML = `
          <input type="checkbox" value="${name}" ${checked ? "checked" : ""}>
          <span>${name}</span>
        `;
        list.appendChild(row);
      });

      bindCheckboxEvents();
    }

    function bindCheckboxEvents() {
      const checkboxes = document.querySelectorAll('#attendanceList input[type="checkbox"]');
      checkboxes.forEach(cb => {
        cb.addEventListener("change", () => {
          const active = Array.from(checkboxes)
            .filter(x => x.checked)
            .map(x => x.value);

          saveActiveSafe(active);
        });
      });
    }

    function setAllAttendance(flag) {
      const allPlayers = getPlayersSafe();
      saveActiveSafe(flag ? allPlayers : []);
      renderAttendance();
    }

    document.getElementById("allOnBtn").addEventListener("click", () => setAllAttendance(true));
    document.getElementById("allOffBtn").addEventListener("click", () => setAllAttendance(false));

    renderAttendance();
  </script>
</body>
</html>
