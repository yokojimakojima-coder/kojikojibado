<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コジバド!! - 名簿管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=20260422_03">
</head>
<body>
  <h1 class="title">コジバド!!</h1>

  <div class="top-nav">
    <a href="players.html" class="nav-link active">名簿管理</a>
    <a href="attendance.html" class="nav-link">参加チェック</a>
    <a href="index.html" class="nav-link">試合作成</a>
  </div>

  <div class="setting-block">
    <h2>名簿管理</h2>
    <div class="row">
      <input id="newName" class="input" placeholder="名前を入力（例：コジコジ）">
      <button id="addBtn" class="small">追加</button>
    </div>

    <div class="row">
      <button id="clearBtn" class="danger">名簿を全削除</button>
    </div>

    <ul id="list" class="name-list"></ul>
    <p class="hint">※順番は今は固定。必要なら並び替えも追加できるよ💖</p>
  </div>

  <script src="common.js?v=20260422_03"></script>
  <script>
    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";
      const all = getAllPlayers();

      all.forEach((name, idx) => {
        const li = document.createElement("li");
        li.className = "name-item";
        li.innerHTML = `
          <span class="name">${escapeHtml(name)}</span>
          <button class="mini danger" data-idx="${idx}">削除</button>
        `;
        list.appendChild(li);
      });

      list.querySelectorAll("button[data-idx]").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.idx);
          const all2 = getAllPlayers();
          all2.splice(i, 1);
          setAllPlayers(all2);

          // activePlayersからも消す
          const active = getActivePlayers().filter(n => n !== btn.parentElement.querySelector(".name").textContent);
          setActivePlayers(active);

          render();
        });
      });
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      }[m]));
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      const input = document.getElementById("newName");
      const name = input.value.trim();
      if (!name) return;

      const all = getAllPlayers();
      all.push(name);
      setAllPlayers(all);
      input.value = "";
      render();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("名簿を全削除する？")) return;
      setAllPlayers([]);
      setActivePlayers([]);
      localStorage.removeItem("scheduleData");
      localStorage.removeItem("kojibado_state_v5");
      render();
    });

    render();
  </script>
</body>
</html>
